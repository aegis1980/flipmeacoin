<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>flipmeacoin.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Raleway:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src='lib/three.min.js'></script>
    <script src="lib/enable3d/enable3d.ammoPhysics.0.22.0.min.js"></script>
    <script src="lib/OrbitControls.js"></script>
    <script src="js/coin.js"></script>
    <script src="js/piday.js"></script>
  </head>

  <body>

    <div id="date-modal">
        <div class="modal-content">
            <h2>Happy π day (or thereabouts)!</h2>
            <p>π day (March 14th) is a celebration of the mathematical constant π.</p>
            <p><a href="https://arxiv.org/pdf/2602.14487" target="_blank">This paper</a> explores the novel way of estimating π with coins flips. Click 'run π experiment' to see it in action!</p>
          <div class="btn-container">
              <button id="dismiss-btn">I just want to flip coins</button>
              <button id="run-btn">Run π experiment</button>
          </div>
        </div>
    </div>

    <div id="control_box_div">
      <div id="toss_icon_div" class= "icon_div">
        <img id='penny_icon' class='icon_svg' src="img/flip_single.svg">
      </div>
    
      <div id="clear_div" class= "icon_div" >
        <img id='clear_icon' class='icon_svg' src="img/trash-alt-solid.svg">
      </div>

      <div id="heads_div" class= "icon_div" >
        <div>Heads</div> <div id="heads-score" class="add-comment"><span id="heads-scores">0</span></div>
      </div>

      <div id="tails_div" class= "icon_div" >
        <div>Tails</div> <div id="tails-score" class="add-comment"><span id="tails-scores">0</span></div>
      </div>
    </div>

    <div id="experiment-overlay" class="bottom-overlay">
      <div class="overlay-left"></div>

        <div class="overlay-center">
          <div class="large-number">π <sub>est</sub>: <span id="mean-display" class="large-number">-</span></div>
        </div>

        <div class="overlay-right">
          <button id="stop-btn" class="stop-button">Stop π experiment</button>
        </div>
    </div>
    
    <footer>
      <div>
        <span>Made by <a id= 'me_link' href="https://www.floatingintheclouds.com">me</a> using <a href="https://threejs.org/">threejs</a> and <a href="https://enable3d.io/">enable3d</a>, for <strong>you</strong>.</span>
      </div>
    </footer>

    <script src="js/scores.js"></script>
    <script src="js/enable_coinflip.js"></script>
  </body>
</html>
